name: playwright-ci
# trigger workflow run

on:
  push:
    branches:
      - feature/github-actions
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    services:
      app:
        image: jaktestowac/rolnopol:latest
    env:
      PLAYWRIGHT_BASE_URL: http://app:3000
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for app
        run: |
          for i in {1..30}; do
            if curl -fsS "$PLAYWRIGHT_BASE_URL" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time" >&2
          exit 1

      - name: Run tests
        run: npm test
