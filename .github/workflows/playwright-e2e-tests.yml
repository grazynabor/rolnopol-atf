name: playwright-ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    services:
      app:
        image: jaktestowac/rolnopol:latest
        ports:
          - 3000:3000
    env:
      PLAYWRIGHT_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers and OS dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for rolnopol service
        run: |
          for i in $(seq 1 30); do
            if curl -sSf "$PLAYWRIGHT_BASE_URL" > /dev/null; then
              echo "Service is ready"
              exit 0
            fi
            echo "Waiting for service... ($i)"
            sleep 2
          done
          echo "Service did not become ready in time" >&2
          exit 1

      - name: Run tests
        run: npm test

      - name: Upload Playwright Report
        if: success() || failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Add Playwright report link to summary
        if: success() || failure()
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo "## Playwright report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: \`playwright-report-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open this workflow run and download the report artifact](${RUN_URL})" >> "$GITHUB_STEP_SUMMARY"
